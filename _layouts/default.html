<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="color-scheme" content="light dark">

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    
</head>
<body>
    <!-- Skip Link -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Navigation -->
    <header class="nav" role="banner">
        <div class="nav__container">
            <a href="#about" class="nav__logo">Naomi Kaunda</a>

            <nav role="navigation" aria-label="Main navigation">
                <ul class="nav__links">
                    <li><a href="#about" class="nav__link">About</a></li>
                    <li><a href="#skills" class="nav__link">Skills</a></li>
                    <li><a href="#contact" class="nav__link">Contact</a></li>
                    <li>
                        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark/light mode">
                            <span aria-hidden="true">🌓</span>
                        </button>
                    </li>
                </ul>
            </nav>

            <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-nav">
                <span class="hamburger" aria-hidden="true"></span>
            </button>
        </div>
    </header>

    <!-- Mobile Navigation Overlay -->
    <div class="mobile-nav-overlay" id="mobile-nav-overlay" aria-hidden="true"></div>

    <!-- Mobile Navigation Drawer -->
    <nav class="mobile-nav" id="mobile-nav" role="navigation" aria-label="Mobile navigation" aria-hidden="true">
        <div class="mobile-nav__header">
            <span>Menu</span>
            <button class="mobile-menu-toggle" id="mobile-menu-close" aria-label="Close menu">
                <span class="hamburger" aria-hidden="true"></span>
            </button>
        </div>
        <ul class="mobile-nav__links">
            <li><a href="#about" class="nav__link">About</a></li>
            <li><a href="#skills" class="nav__link">Skills</a></li>
            <li><a href="#contact" class="nav__link">Contact</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="main" role="main">
        {{ content }}
    </main>

    <!-- Footer -->
    <footer class="footer" role="contentinfo">
        <div class="container">
            <p class="footer__text">© 2026 <a href="https://n3gus.github.io/Mweetwa-Nketani" class="footer__link" target="_blank" rel="noopener noreferrer">Mweetwa Mweembo Nketani</a></p>
        </div>
    </footer>

    <script>
        // Mobile Menu Functionality
        (function() {
            const mobileMenuToggle = document.getElementById('mobile-menu-toggle');
            const mobileMenuClose = document.getElementById('mobile-menu-close');
            const mobileNav = document.getElementById('mobile-nav');
            const mobileNavOverlay = document.getElementById('mobile-nav-overlay');
            const mobileNavLinks = document.querySelectorAll('.mobile-nav__links a');

            function openMobileMenu() {
                mobileNav.classList.add('active');
                mobileNavOverlay.classList.add('active');
                mobileNav.setAttribute('aria-hidden', 'false');
                mobileNavOverlay.setAttribute('aria-hidden', 'false');
                mobileMenuToggle.setAttribute('aria-expanded', 'true');
                document.body.style.overflow = 'hidden';
                mobileMenuClose.focus();
            }

            function closeMobileMenu() {
                mobileNav.classList.remove('active');
                mobileNavOverlay.classList.remove('active');
                mobileNav.setAttribute('aria-hidden', 'true');
                mobileNavOverlay.setAttribute('aria-hidden', 'true');
                mobileMenuToggle.setAttribute('aria-expanded', 'false');
                document.body.style.overflow = '';
                mobileMenuToggle.focus();
            }

            mobileMenuToggle.addEventListener('click', openMobileMenu);
            mobileMenuClose.addEventListener('click', closeMobileMenu);
            mobileNavOverlay.addEventListener('click', closeMobileMenu);

            // Close menu when clicking a link
            mobileNavLinks.forEach(link => {
                link.addEventListener('click', closeMobileMenu);
            });

            // Close on Escape key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && mobileNav.classList.contains('active')) {
                    closeMobileMenu();
                }
            });
        })();

        // Theme Toggle Functionality
        (function() {
            const themeToggle = document.getElementById('theme-toggle');
            const html = document.documentElement;

            // Check for saved theme preference or default to 'light'
            const currentTheme = localStorage.getItem('theme') || 'light';
            html.setAttribute('data-theme', currentTheme);

            themeToggle.addEventListener('click', function() {
                const currentTheme = html.getAttribute('data-theme');
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';

                html.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
            });
        })();

        // Active Navigation Link Highlighting
        (function() {
            const sections = document.querySelectorAll('section[id]');
            const navLinks = document.querySelectorAll('.nav__link');

            function highlightNavLink() {
                const scrollPos = window.scrollY + 100;

                sections.forEach(section => {
                    const sectionTop = section.offsetTop;
                    const sectionHeight = section.offsetHeight;
                    const sectionId = section.getAttribute('id');

                    if (scrollPos >= sectionTop && scrollPos < sectionTop + sectionHeight) {
                        navLinks.forEach(link => {
                            link.classList.remove('active');
                            if (link.getAttribute('href') === '#' + sectionId) {
                                link.classList.add('active');
                            }
                        });
                    }
                });
            }

            window.addEventListener('scroll', highlightNavLink);
            highlightNavLink(); // Initial check
        })();
    </script>
</body>
</html>
